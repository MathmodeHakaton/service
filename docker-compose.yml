services:
  postgres:
    image: postgres:16-alpine
    container_name: ru_liquidity_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ru_liquidity_sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ru_liquidity_sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ru_liquidity

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ru_liquidity_migrate
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ru_liquidity_sentinel
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ru_liquidity
    command: alembic upgrade head
    restart: no # запускается один раз и завершается

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ru_liquidity_app
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ru_liquidity_sentinel
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - ru_liquidity
    command: python main.py schedule --start
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ru_liquidity_dashboard
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ru_liquidity_sentinel
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_HEADLESS: "true"
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - ru_liquidity
    command: streamlit run src/presentation/app.py
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ru_liquidity:
    driver: bridge
